<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منزل الأطباء</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background-color: #F1E9D2;
    margin: 0;
}

/* يخلي الصفحة على قد الشاشة */
.container {
    min-height: 100vh;
    padding: 20px;
    text-align: center;
}

/* Inputs */
input, select, textarea {
    padding: 10px;
    margin: 5px;
    width: 90%;
    max-width: 400px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* Buttons */
button {
    padding: 10px 20px;
    cursor: pointer;
    background: #2c3e50;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #34495e;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    font-weight: bold;
}

.center-title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.section {
    margin-top: 20px;
}

/* فاتورة */
.print {
    display: none;
}

/* شكل رسمي للطباعة */
@media print {

    body {
        background: white;
    }

    .no-print {
        display: none;
    }

    .print {
        display: block;
        padding: 40px;
        font-size: 18px;
        text-align: right;
    }

    .invoice-box {
        border: 2px solid #000;
        padding: 20px;
    }

    .invoice-header {
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .invoice-row {
        margin: 10px 0;
    }

}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container no-print" id="login">

<h2>اختار اسمك</h2>

<select id="username">
<option>محمد طه</option>
<option>مروان محمد طه</option>
<option>دينا عبدالرحمن فرغلي</option>
<option>ريهام عبدالرحمن فرغلي</option>
<option>داليا عبدالرحمن فرغلي</option>
<option>لمياء عبدالرحمن فرغلي</option>
<option>عبدالرحمن وسيم</option>
<option>سلمى وسيم</option>
<option>تسنيم وسيم</option>
<option>admin</option>
</select>

<br>

<input type="password" id="password" placeholder="الباسورد">

<br>

<button onclick="login()">دخول</button>

</div>

<!-- APP -->
<div class="container no-print" id="app" style="display:none">

<div class="header">
<div id="userName"></div>
<div class="center-title">منزل الأطباء و البيئة الطبية</div>
<div></div>
</div>

<div class="section">
<textarea id="notes" placeholder="أي ملاحظات"></textarea>
</div>

<div class="section">
<input type="text" id="from" placeholder="السفر من">
<input type="text" id="to" placeholder="إلى">
</div>

<div class="section">
<h3>الفواتير</h3>

<label><input type="checkbox" id="electric"> فاتورة الكهرباء</label><br>
<label><input type="checkbox" id="water"> فاتورة المياه</label><br>
<label><input type="checkbox" id="gas"> فاتورة الغاز</label>

</div>

<br>

<button onclick="save()">حفظ</button>
<button onclick="printInvoice()">طباعة فاتورة</button>

</div>

<!-- فاتورة -->
<div class="print" id="invoice">

<div class="invoice-box">

<div class="invoice-header">
منزل الأطباء و البيئة الطبية
</div>

<div class="invoice-row">التاريخ: <span id="invDate"></span></div>
<div class="invoice-row">المستخدم: <span id="invUser"></span></div>

<div class="invoice-row">من: <span id="invFrom"></span></div>
<div class="invoice-row">إلى: <span id="invTo"></span></div>

<div class="invoice-row">الملاحظات: <span id="invNotes"></span></div>

<br>

<div class="invoice-row">الكهرباء: <span id="invElectric"></span></div>
<div class="invoice-row">المياه: <span id="invWater"></span></div>
<div class="invoice-row">الغاز: <span id="invGas"></span></div>

<br><br>

<p>تمت مراجعة البيانات</p>
<p>بواسطة د/ زينب سيد علي</p>

<br><br>

<p>التوقيع: _____________</p>

</div>

</div>

<script>

const users = {
"محمد طه":"1234",
"مروان محمد طه":"2222",
"دينا عبدالرحمن فرغلي":"3333",
"ريهام عبدالرحمن فرغلي":"4444",
"داليا عبدالرحمن فرغلي":"5555",
"لمياء عبدالرحمن فرغلي":"1010",
"عبدالرحمن وسيم":"6666",
"سلمى وسيم":"7777",
"تسنيم وسيم":"8888",
"admin":"9999"
}

let currentUser = "";

function login(){
let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(users[u] == p){
    currentUser = u;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userName").innerText = u;
}else{
    alert("الباسورد غلط");
}
}

function save(){
let data = {
notes:document.getElementById("notes").value,
from:document.getElementById("from").value,
to:document.getElementById("to").value,
electric:document.getElementById("electric").checked,
water:document.getElementById("water").checked,
gas:document.getElementById("gas").checked,
date:new Date().toLocaleDateString()
}

localStorage.setItem("data_"+Date.now(), JSON.stringify(data));
alert("تم الحفظ");
}

function printInvoice(){

document.getElementById("invDate").innerText = new Date().toLocaleDateString();
document.getElementById("invUser").innerText = currentUser;
document.getElementById("invFrom").innerText = document.getElementById("from").value;
document.getElementById("invTo").innerText = document.getElementById("to").value;
document.getElementById("invNotes").innerText = document.getElementById("notes").value;

document.getElementById("invElectric").innerText = document.getElementById("electric").checked ? "✔" : "✘";
document.getElementById("invWater").innerText = document.getElementById("water").checked ? "✔" : "✘";
document.getElementById("invGas").innerText = document.getElementById("gas").checked ? "✔" : "✘";

window.print();
}

</script>

</body>
</html>
